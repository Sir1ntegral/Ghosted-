ShortDescription: Sovereign, self-contained Windows privacy tool — search, private email, WireGuard mesh, and bundled Tor.
Description: >-
  Ghosted is a standalone Windows privacy tool: a stealth console, a Google-like search
  homepage, private email (SMTP/IMAP/POP, sealed at rest), and a WireGuard device mesh —
  all on its own engines with no cloud and no other-project dependency. It carries its own
  masked HTTP, bundled Tor for anonymized egress, EDR-lite, and boundary (Gojo). Installs
  per-user and opens its search homepage in your browser on first launch.
